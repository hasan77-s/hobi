<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HobiKeşif AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --bg: #0b0f19; --card: rgba(20, 25, 40, 0.7); --border: rgba(255,255,255,0.1); --accent: #6366f1; --text: #f8fafc; --muted: #94a3b8; }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
    body { background: var(--bg); color: var(--text); padding: 20px; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
    .container { max-width: 800px; width: 100%; }
    header { text-align: center; margin-bottom: 40px; }
    h1 { font-size: 2.5rem; background: linear-gradient(to right, #818cf8, #2dd4bf); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    
    .card { background: var(--card); border: 1px solid var(--border); padding: 30px; border-radius: 16px; backdrop-filter: blur(10px); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    
    .step { display: none; }
    .step.active { display: block; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    
    .options { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-top: 20px; }
    .opt { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 10px; cursor: pointer; border: 2px solid transparent; transition: 0.2s; text-align: center; }
    .opt:hover { background: rgba(255,255,255,0.1); }
    .opt.selected { border-color: var(--accent); background: rgba(99, 102, 241, 0.2); }
    
    button { background: var(--accent); color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-weight: 600; width: 100%; margin-top: 20px; font-size: 1rem; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    button:hover:not(:disabled) { opacity: 0.9; }
    
    .result-box { margin-top: 20px; padding: 15px; background: rgba(0,0,0,0.3); border-radius: 8px; border-left: 4px solid var(--accent); }
    .day-item { margin-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
    
    #errorMsg { background: rgba(239, 68, 68, 0.2); border: 1px solid #ef4444; padding: 15px; border-radius: 8px; margin-top: 20px; display: none; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🧠 HobiKeşif AI</h1>
      <p style="color:var(--muted)">Yapay zeka sana özel hobi planlasın.</p>
    </header>

    <div class="card">
      <!-- Adım 1: Zaman -->
      <div class="step active" id="step1">
        <h3>⏱ Haftada ne kadar vaktin var?</h3>
        <div class="options">
          <div class="opt" onclick="selectOpt(1, '1-2 saat', this)">1-2 Saat</div>
          <div class="opt" onclick="selectOpt(1, '3-5 saat', this)">3-5 Saat</div>
          <div class="opt" onclick="selectOpt(1, '5+ saat', this)">5+ Saat</div>
        </div>
      </div>

      <!-- Adım 2: Bütçe -->
      <div class="step" id="step2">
        <h3>💰 Bütçen ne kadar?</h3>
        <div class="options">
          <div class="opt" onclick="selectOpt(2, 'Bedava', this)">Bedava</div>
          <div class="opt" onclick="selectOpt(2, 'Az (0-200₺)', this)">Az (0-200₺)</div>
          <div class="opt" onclick="selectOpt(2, 'Orta (200₺+)', this)">Orta (200₺+)</div>
        </div>
      </div>

      <!-- Adım 3: Tarz -->
      <div class="step" id="step3">
        <h3>🎯 İlgi alanın ne?</h3>
        <div class="options">
          <div class="opt" onclick="selectOpt(3, 'Teknoloji & Kod', this)">Teknoloji</div>
          <div class="opt" onclick="selectOpt(3, 'Sanat & Tasarım', this)">Sanat</div>
          <div class="opt" onclick="selectOpt(3, 'Spor & Doğa', this)">Spor</div>
          <div class="opt" onclick="selectOpt(3, 'Müzik & Ses', this)">Müzik</div>
        </div>
      </div>

      <!-- Yükleniyor -->
      <div class="step" id="loading">
        <h3 style="text-align:center">🤖 AI düşünüyor...</h3>
        <p style="text-align:center; color:var(--muted); margin-top:10px">Lütfen bekle, yol haritan hazırlanıyor.</p>
      </div>

      <!-- Sonuç -->
      <div class="step" id="result">
        <h2 id="resTitle"></h2>
        <p id="resWhy" style="color:var(--muted); margin-bottom:15px;"></p>
        <div id="resPlan"></div>
        <button onclick="location.reload()">🔄 Yeniden Başla</button>
      </div>

      <div id="errorMsg"></div>
      <button id="nextBtn" onclick="nextStep()" disabled>Devam Et →</button>
    </div>
  </div>

  <script>
    let currentStep = 1;
    let answers = {};

    function selectOpt(step, value, el) {
      document.querySelectorAll(`#step${step} .opt`).forEach(e => e.classList.remove('selected'));
      el.classList.add('selected');
      answers[step] = value;
      document.getElementById('nextBtn').disabled = false;
    }

    function nextStep() {
      if (currentStep === 3) {
        generateAI();
      } else {
        document.getElementById(`step${currentStep}`).classList.remove('active');
        currentStep++;
        document.getElementById(`step${currentStep}`).classList.add('active');
        document.getElementById('nextBtn').disabled = true;
      }
    }

    async function generateAI() {
      document.getElementById('step3').classList.remove('active');
      document.getElementById('loading').classList.add('active');
      document.getElementById('nextBtn').style.display = 'none';
      document.getElementById('errorMsg').style.display = 'none';

      const prompt = `Kullanıcı: Zaman='${answers[1]}', Bütçe='${answers[2]}', İlgi='${answers[3]}'. 
Tek bir hobi öner ve 7 günlük plan yap. 
Format: {"hobby": "İsim", "why": "Neden uygun", "plan": ["Gün 1: ...", "Gün 2: ...", "Gün 3: ...", "Gün 4: ...", "Gün 5: ...", "Gün 6: ...", "Gün 7: ..."]}`;

      try {
        const response = await fetch('https://hobiapi.alyux.workers.dev/', {
          method: 'POST',
          headers: { 
            'Content-Type': 'application/json',
            'Accept': 'application/json'
          },
          body: JSON.stringify({
            model: 'meta-llama/llama-3.1-8b-instruct',
            messages: [{ role: 'user', content: prompt }],
            max_tokens: 600,
            temperature: 0.7
          })
        });

        console.log('Response status:', response.status);
        
        if (!response.ok) {
          const errorData = await response.json().catch(() => ({}));
          throw new Error(errorData.error || `Sunucu hatası: ${response.status}`);
        }

        const data = await response.json();
        console.log('AI Response:', data);
        
        if (!data.choices || !data.choices[0] || !data.choices[0].message) {
          throw new Error('Geçersiz AI yanıtı');
        }
        
        let content = data.choices[0].message.content;
        console.log('AI Content:', content);
        
        // JSON'u temizle
        let jsonStr = content.replace(/```json/g, '').replace(/```/g, '').trim();
        let result = JSON.parse(jsonStr);

        document.getElementById('loading').classList.remove('active');
        document.getElementById('result').classList.add('active');
        
        document.getElementById('resTitle').innerText = "🎯 " + result.hobby;
        document.getElementById('resWhy').innerText = result.why;
        
        let planHtml = '<div class="result-box"><h3 style="margin-bottom:15px">📅 7 Günlük Plan</h3>';
        result.plan.forEach((day, index) => {
          planHtml += `<div class="day-item"><strong>${index + 1}. Gün:</strong> ${day}</div>`;
        });
        planHtml += '</div>';
        document.getElementById('resPlan').innerHTML = planHtml;

      } catch (err) {
        console.error('Error:', err);
        document.getElementById('loading').classList.remove('active');
        document.getElementById('errorMsg').style.display = 'block';
        document.getElementById('errorMsg').innerHTML = `
          <strong>❌ Hata Oluştu:</strong><br>
          ${err.message}<br><br>
          <small>Worker URL kontrol edildi: https://hobiapi.alyux.workers.dev/</small><br>
          <button onclick="location.reload()" style="margin-top:10px; background:#ef4444">Tekrar Dene</button>
        `;
      }
    }
  </script>
</body>
</html>
